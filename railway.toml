[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

# cycling-fantasy-game: web server service.
[services.cycling-fantasy-game.deploy]
startCommand = "/app/start.sh"
healthcheckPath = "/up"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# block-stages-scheduler: cron service — runs schedule:run once per invocation.
# Configure the cron schedule in Railway to: */5 * * * *
[services.block-stages-scheduler.deploy]
startCommand = "/app/start-scheduler.sh"
restartPolicyType = "never"
# healthcheckPath = "/up"  # not applicable to cron jobs
